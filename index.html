<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4A6E9A">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #E5E5EA;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
}

.calc {
  width: min(360px, 100vw);
  background: #fff;
  border-radius: clamp(0px, 4vw, 28px);
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.08);
}

/* ── DISPLAY ── */
.display {
  padding: 24px 22px 20px;
  height: clamp(190px, 52vw, 230px);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: background 0.25s ease;
  border-radius: clamp(0px, 4vw, 28px) clamp(0px, 4vw, 28px) 0 0;
}
.display.sci  { background: #4A6E9A; }
.display.norm { background: #C75F56; }
.display.curr { background: #4A8E7C; }
.display.tip  { background: #C49A3C; }

.expr {
  font-size: clamp(15px, 4.5vw, 19px);
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  min-height: 18px;
  line-height: 1.5;
  word-break: break-all;
  max-height: 60px;
  overflow: hidden;
}


.result {
  font-weight: 700;
  color: #fff;
  text-align: right;
  line-height: 1;
  letter-spacing: -1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: font-size 0.1s;
}

/* ── TABS ── */
.tabs {
  display: flex;
  padding: 12px 10px 0;
  gap: 8px;
}
.tab {
  background: none;
  border: none;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.14em;
  color: #AAAAAA;
  cursor: pointer;
  padding-bottom: 10px;
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.tab.active-sci  { color: #4A6E9A; border-color: #4A6E9A; }
.tab.active-norm { color: #C75F56; border-color: #C75F56; }
.tab.active-curr { color: #4A8E7C; border-color: #4A8E7C; }
.tab.active-tip  { color: #C49A3C; border-color: #C49A3C; }

.divider { height: 1px; background: #EFEFEF; }

/* ── SCIENTIFIC BUTTONS ── */
.sci-wrap {
  padding: 6px 14px 2px;
  transition: opacity 0.2s;
}
.sci-wrap.off {
  opacity: 0.15;
  pointer-events: none;
}
.sci-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 4px;
}
.sb {
  height: clamp(32px, 9vw, 36px);
  background: none;
  border: none;
  border-radius: 7px;
  font-size: clamp(11px, 3.2vw, 13px);
  color: #555;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
  white-space: nowrap;
  user-select: none;
}
.sb:hover  { background: #F2F2F5; }
.sb:active { background: #E8E8EC; }
.sb.empty  { cursor: default; pointer-events: none; }
.sb.empty:hover { background: none; }
.sb sup { font-size: 7px; line-height: 0; vertical-align: super; }
.sb.arrow { font-size: 17px; color: #999; }

/* ── CURRENCY SECTION ── */
.curr-wrap {
  padding: 6px 14px 4px;
  display: none;
}
.curr-wrap.visible { display: block; }

.rate-line {
  font-size: clamp(13px, 3.5vw, 15px);
  color: #AAAAAA;
  min-height: 16px;
}

/* ── CURRENCY A/B DISPLAY ── */
.curr-ab {
  display: none;
  flex-direction: column;
  justify-content: space-between;
  flex: 1;
  padding: 2px 0;
}
.display.curr .curr-ab { display: flex; }
.display.curr .expr    { display: none; }
.display.curr .result  { display: none; }

.curr-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 4px;
  border-radius: 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.12s;
}
.curr-row:active { background: rgba(255,255,255,0.12); }
.curr-row-flag { font-size: 22px; line-height: 1; flex-shrink: 0; }
.curr-row-code {
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}
.curr-row-chev {
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  flex-shrink: 0;
}
.curr-row-amt {
  margin-left: auto;
  font-size: clamp(22px, 6vw, 28px);
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
  max-width: 58%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: right;
}

.curr-swap-line {
  display: flex;
  align-items: center;
  gap: 10px;
}
.curr-swap-line::before,
.curr-swap-line::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.22);
}
.curr-swap-btn {
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.25);
  border-radius: 50%;
  width: 38px;
  height: 38px;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
  padding: 0;
  line-height: 1;
  text-align: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.curr-swap-btn:active { background: rgba(255,255,255,0.28); }

/* ── NUMERIC BUTTONS ── */
.num-wrap { padding: 8px 14px 18px; }
.num-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
}
.nb {
  height: clamp(46px, 13vw, 52px);
  background: #F5F5F7;
  border: none;
  border-radius: clamp(10px, 3vw, 14px);
  font-size: clamp(16px, 4.8vw, 19px);
  color: #222;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
  font-weight: 400;
  user-select: none;
}
.nb:hover  { background: #EBEBED; }
.nb:active { background: #DEDEE0; }
.nb.sym { font-size: clamp(20px, 5.5vw, 24px); }
.nb.txt { font-size: clamp(12px, 3.8vw, 15px); font-weight: 600; }
.nb.empty { background: none; pointer-events: none; }
.nb.eq  { color: #fff; font-size: clamp(18px, 5.5vw, 22px); font-weight: 500; }
.nb.eq:hover  { opacity: 0.88; }
.nb.eq:active { opacity: 0.78; }
.nb.dimmed { opacity: 0.25; pointer-events: none; }

/* ── OVERLAY ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  pointer-events: none;
  transition: background 0.25s;
}
.overlay.open {
  background: rgba(0,0,0,0.45);
  pointer-events: all;
}
.overlay-panel {
  width: min(360px, 100vw);
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 8px 16px 24px;
  max-height: 72vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
}
.overlay.open .overlay-panel { transform: translateY(0); }

.overlay-handle {
  width: 36px;
  height: 4px;
  background: #E0E0E0;
  border-radius: 2px;
  margin: 6px auto 14px;
}
.curr-search {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid #E8E8E8;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
  margin-bottom: 10px;
  color: #222;
}
.curr-search:focus { border-color: #4A8E7C; }

.curr-list {
  overflow-y: auto;
  flex: 1;
}
.curr-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 4px;
  cursor: pointer;
  border-bottom: 1px solid #F5F5F5;
  user-select: none;
}
.curr-item:hover  { background: #F8F8F8; }
.curr-item:active { background: #F0F0F0; }
.curr-flag { font-size: 22px; width: 28px; text-align: center; }
.curr-item-info { flex: 1; }
.curr-item-code { font-weight: 700; font-size: 15px; color: #222; }
.curr-item-name { font-size: 15px; color: #555; }
.curr-item-country { font-size: 13px; color: #999; }
.curr-item-check { font-size: 16px; color: #4A8E7C; min-width: 20px; text-align: right; }

@media (max-width: 480px) {
  body {
    align-items: flex-start;
    background: #fff;
  }
  .calc {
    width: 100vw;
    height: 100dvh;
    border-radius: 0;
    box-shadow: none;
    display: flex;
    flex-direction: column;
  }
  .display {
    border-radius: 0;
    flex-shrink: 0;
  }
  .tabs { flex-shrink: 0; }
  .divider { flex-shrink: 0; }
  .sci-wrap { flex-shrink: 0; padding: 6px 8px 2px; }
  .curr-wrap { flex-shrink: 0; padding: 10px 8px 6px; }
  .tip-wrap  { flex: 1; overflow-y: auto; padding: 12px 10px 16px; }
  .num-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px 8px 16px;
  }
  .num-grid {
    flex: 1;
    grid-template-rows: repeat(4, 1fr);
  }
  .nb { height: auto; }
  .toast { bottom: 100px; }
}

/* ── HISTORY BUTTON ── */
.hist-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.6);
  font-size: 18px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.15s;
  user-select: none;
}
.hist-btn:hover  { color: rgba(255,255,255,0.9); }
.display.curr .hist-btn { opacity: 0; pointer-events: none; }

/* ── DISPLAY TOP ROW ── */
.display-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.display-top .expr { flex: 1; text-align: right; }

/* ── RESULT — tap to copy ── */
.result { cursor: pointer; }

/* ── HISTORY SHEET ── */
.hist-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 110;
  pointer-events: none;
  transition: background 0.25s;
}
.hist-overlay.open {
  background: rgba(0,0,0,0.45);
  pointer-events: all;
}
.hist-panel {
  width: min(360px, 100vw);
  background: #fff;
  border-radius: 20px 20px 0 0;
  padding: 8px 16px 24px;
  max-height: 60vh;
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
}
.hist-overlay.open .hist-panel { transform: translateY(0); }
.hist-handle {
  width: 36px; height: 4px;
  background: #E0E0E0; border-radius: 2px;
  margin: 6px auto 14px;
}
.hist-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.hist-title  { font-size: 16px; font-weight: 600; color: #222; }
.hist-clear  { background: none; border: none; font-size: 15px; color: #C75F56; cursor: pointer; padding: 4px 8px; }
.hist-list   { overflow-y: auto; flex: 1; }
.hist-item {
  padding: 12px 6px;
  border-bottom: 1px solid #F5F5F5;
  cursor: pointer;
  user-select: none;
  border-radius: 8px;
}
.hist-item:hover  { background: #F8F8F8; }
.hist-item:active { background: #F0F0F0; }
.hist-item-expr   { font-size: 15px; color: #999; margin-bottom: 2px; }
.hist-item-result { font-size: 22px; font-weight: 700; color: #222; }
.hist-empty { text-align: center; color: #AAAAAA; font-size: 15px; padding: 40px 0; }

/* ── TIP WRAP (inline mode) ── */
.tip-wrap {
  display: none;
  flex-direction: column;
  padding: 14px 16px 20px;
}
.tip-wrap.visible { display: flex; }
.tip-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.tip-lbl { font-size: 15px; color: #555; }
.tip-inp {
  width: 120px;
  padding: 8px 12px;
  border: 1.5px solid #E8E8E8;
  border-radius: 10px;
  font-size: 15px;
  text-align: right;
  outline: none;
  color: #222;
}
.tip-inp:focus { border-color: #C49A3C; }
.tip-divider { height: 1px; background: #F0F0F0; margin: 12px 0; }
.tip-result-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.tip-result-lbl { font-size: 15px; color: #999; }
.tip-result-val { font-size: 17px; font-weight: 700; color: #222; }
.tip-result-val.big { font-size: 22px; color: #C75F56; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: #fff;
  padding: 10px 22px;
  border-radius: 20px;
  font-size: 15px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 200;
  white-space: nowrap;
}
.toast.visible { opacity: 1; }
</style>
</head>
<body>

<div class="calc">

  <!-- Display -->
  <div class="display sci" id="disp">
    <div class="display-top">
      <button class="hist-btn" id="histBtn" onclick="openHistory()">🕐</button>
      <div class="expr" id="exprEl"></div>
    </div>
    <div class="curr-ab" id="currAB">
      <div class="curr-row" onclick="openOverlay('from')">
        <span class="curr-row-flag" id="currFromFlag">🇺🇸</span>
        <span class="curr-row-code" id="currFromCode">USD</span>
        <span class="curr-row-chev">▾</span>
        <span class="curr-row-amt"  id="currFromAmt">0</span>
      </div>
      <div class="curr-swap-line">
        <button class="curr-swap-btn" onclick="swapCurrencies()">↑↓</button>
      </div>
      <div class="curr-row" onclick="openOverlay('to')">
        <span class="curr-row-flag" id="currToFlag">🇮🇱</span>
        <span class="curr-row-code" id="currToCode">ILS</span>
        <span class="curr-row-chev">▾</span>
        <span class="curr-row-amt"  id="currToAmt">0</span>
      </div>
    </div>
    <div class="result" id="resultEl" onclick="copyResult()">0</div>
  </div>

  <!-- Mode tabs -->
  <div class="tabs">
    <button class="tab" id="tabNorm" onclick="setMode('norm')">NORMAL</button>
    <button class="tab" id="tabSci"  onclick="setMode('sci')">SCIENTIFIC</button>
    <button class="tab" id="tabCurr" onclick="setMode('curr')">CURRENCY</button>
    <button class="tab" id="tabTip"  onclick="setMode('tip')">TIPS</button>
  </div>
  <div class="divider"></div>

  <!-- Scientific section -->
  <div class="sci-wrap" id="sciWrap">
    <div class="sci-grid">
      <button class="sb"       onclick="ins('abs(')">Abs</button>
      <button class="sb"       onclick="insPow(3)">x³</button>
      <button class="sb arrow">‹</button>
      <button class="sb arrow">›</button>
      <button class="sb"       onclick="insPow(2)">x²</button>
      <button class="sb"       onclick="ins('^')">x<sup style="font-size:8px;margin-left:1px">□</sup></button>
      <button class="sb"       onclick="ins('mod ')">mod</button>
      <button class="sb"       onclick="ins('sqrt(')">√</button>
      <button class="sb"       onclick="ins('3.14159265')">π</button>
      <button class="sb"       onclick="ins('2.71828183')">e</button>
      <button class="sb"       onclick="ins('log(')">Log</button>
      <button class="sb"       onclick="ins('ln(')">ln</button>
      <button class="sb" id="hypBtn" onclick="toggleHyp()">hyp</button>
      <button class="sb" id="sinBtn" onclick="insTrig('sin')">sin</button>
      <button class="sb"             onclick="ins('(')">&thinsp;(&thinsp;</button>
      <button class="sb"             onclick="ins(')')">&thinsp;)&thinsp;</button>
      <button class="sb" id="cosBtn" onclick="insTrig('cos')">cos</button>
      <button class="sb" id="tanBtn" onclick="insTrig('tan')">tan</button>
    </div>
  </div>

  <!-- Currency section -->
  <div class="curr-wrap" id="currWrap">
    <div class="rate-line" id="rateLine">Loading rates...</div>
  </div>

  <!-- Tips section -->
  <div class="tip-wrap" id="tipWrap">
    <div class="tip-row">
      <span class="tip-lbl">Bill total</span>
      <input class="tip-inp" id="tipBill" type="number" inputmode="decimal" placeholder="0" oninput="calcTip()">
    </div>
    <div class="tip-row">
      <span class="tip-lbl">Tip %</span>
      <input class="tip-inp" id="tipPct" type="number" inputmode="decimal" placeholder="15" value="15" oninput="calcTip()">
    </div>
    <div class="tip-row">
      <span class="tip-lbl">Split between</span>
      <input class="tip-inp" id="tipSplit" type="number" inputmode="numeric" placeholder="1" value="1" oninput="calcTip()">
    </div>
    <div class="tip-divider"></div>
    <div class="tip-result-row">
      <span class="tip-result-lbl">Tip amount</span>
      <span class="tip-result-val" id="tipAmt">—</span>
    </div>
    <div class="tip-result-row">
      <span class="tip-result-lbl">Total</span>
      <span class="tip-result-val" id="tipTotal">—</span>
    </div>
    <div class="tip-result-row">
      <span class="tip-result-lbl">Per person</span>
      <span class="tip-result-val big" id="tipPer">—</span>
    </div>
  </div>

  <!-- Numeric section -->
  <div class="num-wrap" id="numWrap">
    <div class="num-grid">
      <button class="nb"     onclick="ins('7')">7</button>
      <button class="nb"     onclick="ins('8')">8</button>
      <button class="nb"     onclick="ins('9')">9</button>
      <button class="nb txt" id="delBtn"  onclick="doDelete()">DEL</button>
      <button class="nb txt" id="acBtn"   onclick="doClear()">AC</button>
      <button class="nb"     onclick="ins('4')">4</button>
      <button class="nb"     onclick="ins('5')">5</button>
      <button class="nb"     onclick="ins('6')">6</button>
      <button class="nb sym" id="mulBtn"  onclick="ins('×')">×</button>
      <button class="nb sym" id="divBtn"  onclick="ins('÷')">÷</button>
      <button class="nb"     onclick="ins('1')">1</button>
      <button class="nb"     onclick="ins('2')">2</button>
      <button class="nb"     onclick="ins('3')">3</button>
      <button class="nb sym" id="addBtn"  onclick="ins('+')">+</button>
      <button class="nb sym" id="subBtn"  onclick="ins('−')">−</button>
      <button class="nb"     onclick="ins('0')">0</button>
      <button class="nb"     onclick="ins('.')">.</button>
      <button class="nb txt" id="signBtn" onclick="toggleSign()">+/-</button>
      <button class="nb txt" id="ansBtn"  onclick="insAns()">Ans</button>
      <button class="nb eq"  id="eqBtn"   onclick="doCalc()">=</button>
    </div>
  </div>

</div>

<!-- History sheet -->
<div class="hist-overlay" id="histOverlay" onclick="handleHistOverlayBg(event)">
  <div class="hist-panel">
    <div class="hist-handle"></div>
    <div class="hist-header">
      <span class="hist-title">History</span>
      <button class="hist-clear" onclick="clearHistory()">Clear</button>
    </div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">Copied!</div>

<!-- Currency overlay -->
<div class="overlay" id="overlay" onclick="handleOverlayBg(event)">
  <div class="overlay-panel">
    <div class="overlay-handle"></div>
    <input class="curr-search" id="currSearch" type="text"
           placeholder="Search by currency or country..."
           oninput="filterCurrencies(this.value)">
    <div class="curr-list" id="currList"></div>
  </div>
</div>

<script>
'use strict';

// ── CONSTANTS ────────────────────────────────────────────
const SCI_COLOR  = '#4A6E9A';
const NORM_COLOR = '#C75F56';
const CURR_COLOR = '#4A8E7C';
const TIP_COLOR  = '#C49A3C';

// ── CALC STATE ───────────────────────────────────────────
let expr    = '';
let lastAns = null;
let hypOn   = false;
let mode    = 'sci';
let afterEq = false;

// ── CURRENCY STATE ───────────────────────────────────────
let currFrom = localStorage.getItem('currFrom') || 'USD';
let currTo   = localStorage.getItem('currTo')   || 'ILS';
let rates    = {};
let currExpr = '';
let overlayTarget = 'from';

const ALL_CURRENCIES = [
  { code:'ILS', name:'Israeli Shekel',     country:'Israel',            flag:'🇮🇱' },
  { code:'USD', name:'US Dollar',           country:'United States',     flag:'🇺🇸' },

// ── MODE ─────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  const isSci  = m === 'sci';
  const isCurr = m === 'curr';
  const isTip  = m === 'tip';
  const color  = isSci ? SCI_COLOR : isCurr ? CURR_COLOR : isTip ? TIP_COLOR : NORM_COLOR;

  document.getElementById('disp').className    = 'display ' + m;
  document.getElementById('tabSci').className  = 'tab' + (m === 'sci'  ? ' active-sci'  : '');
  document.getElementById('tabNorm').className = 'tab' + (m === 'norm' ? ' active-norm' : '');
  document.getElementById('tabCurr').className = 'tab' + (m === 'curr' ? ' active-curr' : '');
  document.getElementById('tabTip').className  = 'tab' + (m === 'tip'  ? ' active-tip'  : '');

  const sciWrap  = document.getElementById('sciWrap');
  const currWrap = document.getElementById('currWrap');
  const tipWrap  = document.getElementById('tipWrap');
  const numWrap  = document.getElementById('numWrap');

  if (isCurr) {
    sciWrap.style.display  = 'none';
    currWrap.className     = 'curr-wrap visible';
    tipWrap.className      = 'tip-wrap';
    numWrap.style.display  = '';
    dimCalcButtons(true);
    if (!Object.keys(rates).length) fetchRates(); else { rates['ILS'] = 1; refreshCurrencyDisplay(); refreshCurrency(); }
  } else if (isTip) {
    sciWrap.style.display = 'none';
    currWrap.className    = 'curr-wrap';
    tipWrap.className     = 'tip-wrap visible';
    numWrap.style.display = 'none';
    calcTip();
    setTimeout(() => document.getElementById('tipBill').focus(), 300);
  } else {
    sciWrap.style.display  = isSci ? '' : 'none';
    currWrap.className     = 'curr-wrap';
    tipWrap.className      = 'tip-wrap';
    sciWrap.className      = 'sci-wrap';
    numWrap.style.display  = '';
    dimCalcButtons(false);
    refresh();
  }

  ['delBtn','acBtn','mulBtn','divBtn','addBtn','subBtn','ansBtn','signBtn'].forEach(id => {
    document.getElementById(id).style.color = color;
  });
  document.getElementById('eqBtn').style.background = color;

  if (hypOn && !isSci) { hypOn = false; styleHyp(); }
}

function dimCalcButtons(on) {
  ['mulBtn','divBtn','addBtn','subBtn','signBtn','ansBtn','eqBtn'].forEach(id => {
    const el = document.getElementById(id);
    if (on) el.classList.add('dimmed');
    else    el.classList.remove('dimmed');
  });
}

// ── CALC INPUT ───────────────────────────────────────────
function ins(ch) {
  if (mode === 'curr') {
    if (/^[0-9]$/.test(ch) || ch === '.') currIns(ch);
    return;
  }
  if (afterEq) {
    afterEq = false;
    const isNewStart = /^[0-9.(]$/.test(ch) || /^[a-z]/.test(ch);
    expr = isNewStart ? ch : fmtNum(lastAns) + ch;
  } else {
    expr += ch;
  }
  refresh();
}

function insPow(n) {
  if (mode === 'curr') return;
  afterEq = false;
  expr += '^' + n;
  refresh();
}

function insTrig(fn) {
  if (mode === 'curr') return;
  const name = (hypOn ? fn + 'h' : fn) + '(';
  if (hypOn) { hypOn = false; styleHyp(); }
  ins(name);
}

function toggleSign() {
  if (mode === 'curr') return;
  if (afterEq && lastAns !== null) {
    const neg = -lastAns;
    lastAns = neg;
    expr    = fmtNum(neg);
    afterEq = false;
    refresh();
    return;
  }
  if (!expr) return;
  if (expr.startsWith('−') || expr.startsWith('-')) expr = expr.slice(1);
  else expr = '−' + expr;
  refresh();
}

function insAns() {
  if (mode === 'curr') return;
  if (lastAns !== null) ins(fmtNum(lastAns));
}

function toggleHyp() {
  hypOn = !hypOn;
  styleHyp();
}

function styleHyp() {
  const btn   = document.getElementById('hypBtn');
  const color = mode === 'sci' ? SCI_COLOR : NORM_COLOR;
  btn.style.fontWeight = hypOn ? '700' : '400';
  btn.style.color      = hypOn ? color : '#555';
}

function doDelete() {
  if (mode === 'curr') { currExpr = currExpr.slice(0, -1); refreshCurrency(); return; }
  afterEq = false;
  if (!expr) return;
  const fnMatch = expr.match(/(sin|cos|tan|sinh|cosh|tanh|abs|sqrt|log|ln)\($/);
  if (fnMatch)                   expr = expr.slice(0, -fnMatch[0].length);
  else if (expr.endsWith('mod ')) expr = expr.slice(0, -4);
  else                            expr = expr.slice(0, -1);
  refresh();
}

function doClear() {
  if (mode === 'curr') { currExpr = ''; refreshCurrency(); return; }
  afterEq = false;
  expr    = '';
  refresh();
}

// ── CALC ENGINE ──────────────────────────────────────────
function doCalc() {
  if (mode === 'curr') return;
  if (!expr) return;
  let res;
  try   { res = evalExpr(expr); }
  catch { showResult('Error'); return; }
  if (isNaN(res))     { showResult('Error'); return; }
  if (!isFinite(res)) { showResult(res > 0 ? '∞' : '-∞'); return; }
  lastAns = res;
  document.getElementById('exprEl').textContent = expr;
  setResult(fmtNum(res));
  addToHistory(expr, fmtNum(res));
  expr    = fmtNum(res);
  afterEq = true;
}

function evalExpr(str) {
  const s = str
    .replace(/×/g,          '*')
    .replace(/÷/g,          '/')
    .replace(/−/g,          '-')
    .replace(/\^/g,         '**')
    .replace(/\bmod\b\s*/g, '%')
    .replace(/abs\(/g,      'Math.abs(')
    .replace(/sqrt\(/g,     'Math.sqrt(')
    .replace(/log\(/g,      'Math.log10(')
    .replace(/ln\(/g,       'Math.log(')
    .replace(/sinh\(/g,     'Math.sinh(')
    .replace(/cosh\(/g,     'Math.cosh(')
    .replace(/tanh\(/g,     'Math.tanh(')
    .replace(/sin\(/g,      '_s(')
    .replace(/cos\(/g,      '_c(')
    .replace(/tan\(/g,      '_t(');
  const D = Math.PI / 180;
  return new Function('_s','_c','_t', '"use strict"; return (' + s + ')')(
    x => Math.sin(x * D),
    x => Math.cos(x * D),
    x => Math.tan(x * D)
  );
}

function fmtNum(n) {
  if (!isFinite(n)) return n > 0 ? '∞' : '-∞';
  if (Number.isInteger(n) && Math.abs(n) < 1e15) return String(n);
  return String(parseFloat(n.toPrecision(10)));
}

function setResult(txt) {
  const el  = document.getElementById('resultEl');
  const len = txt.length;
  el.style.fontSize = len > 18 ? '24px' : len > 12 ? '34px' : len > 9 ? '42px' : '50px';
  el.textContent    = txt;
}

function showResult(txt) {
  document.getElementById('resultEl').textContent = txt;
}

function refresh() {
  document.getElementById('exprEl').textContent = expr;
  if (!expr) { setResult('0'); return; }
  try {
    const res = evalExpr(expr);
    if (isFinite(res) && !isNaN(res)) setResult(fmtNum(res));
  } catch { /* partial input */ }
}

// ── CURRENCY LOGIC ───────────────────────────────────────
function currIns(ch) {
  if (ch === '.' && currExpr.includes('.')) return;
  if (ch === '.' && currExpr === '') currExpr = '0';
  currExpr += ch;
  refreshCurrency();
}

function refreshCurrencyDisplay() {
  const fromC = ALL_CURRENCIES.find(c => c.code === currFrom) || { flag:'🏳️', code: currFrom };
  const toC   = ALL_CURRENCIES.find(c => c.code === currTo)   || { flag:'🏳️', code: currTo };
  document.getElementById('currFromFlag').textContent = fromC.flag;
  document.getElementById('currFromCode').textContent = fromC.code;
  document.getElementById('currToFlag').textContent   = toC.flag;
  document.getElementById('currToCode').textContent   = toC.code;
}

function refreshCurrency() {
  const amount   = parseFloat(currExpr) || 0;
  const fromRate = currFrom === 'ILS' ? 1 : rates[currFrom];
  const toRate   = currTo   === 'ILS' ? 1 : rates[currTo];

  document.getElementById('currFromAmt').textContent = currExpr || '0';

  if (!fromRate || !toRate) {
    document.getElementById('currToAmt').textContent = '...';
    return;
  }
  const result = amount * fromRate / toRate;
  document.getElementById('currToAmt').textContent = fmtAmt(result);
}

function swapCurrencies() {
  [currFrom, currTo] = [currTo, currFrom];
  localStorage.setItem('currFrom', currFrom);
  localStorage.setItem('currTo',   currTo);
  refreshCurrencyDisplay();
  refreshCurrency();
}

function fmtAmt(n) {
  if (!isFinite(n) || isNaN(n) || n === 0) return '0';
  if (n >= 1e9)  return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1000) return n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return n >= 0.01 ? n.toFixed(2) : n.toFixed(4);
}

async function fetchRates() {
  document.getElementById('rateLine').textContent = 'Fetching rates...';

  // Try cache first
  const cached = localStorage.getItem('ratesCache');
  if (cached) {
    const { date, data } = JSON.parse(cached);
    const today = new Date().toISOString().slice(0, 10);
    if (date === today) {
      rates = data;
      afterFetch();
      return;
    }
  }

  try {
    const res  = await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/ils.json');
    const data = await res.json();
    const ilsBase = data.ils;
    const newRates = {};
    ALL_CURRENCIES.forEach(({ code }) => {
      if (code === 'ILS') return;
      const key = code.toLowerCase();
      if (ilsBase[key] && ilsBase[key] > 0) newRates[code] = 1 / ilsBase[key];
    });
    newRates['ILS'] = 1;
    rates = newRates;
    const today = new Date().toISOString().slice(0, 10);
    localStorage.setItem('ratesCache', JSON.stringify({ date: today, data: rates }));
    afterFetch();
  } catch {
    document.getElementById('rateLine').textContent = 'Could not load rates — check connection';
  }
}

function afterFetch() {
  rates['ILS'] = 1;
  const now     = new Date();
  const timeStr = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('rateLine').textContent = 'Market rates · Updated today ' + timeStr;
  refreshCurrencyDisplay();
  refreshCurrency();
}

// ── OVERLAY ──────────────────────────────────────────────
function openOverlay(target) {
  overlayTarget = target || 'from';
  document.getElementById('currSearch').value = '';
  filterCurrencies('');
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('currSearch').focus(), 300);
}

function selectFromOverlay(code) {
  if (overlayTarget === 'from') {
    currFrom = code;
    localStorage.setItem('currFrom', currFrom);
  } else {
    currTo = code;
    localStorage.setItem('currTo', currTo);
  }
  closeOverlay();
  refreshCurrencyDisplay();
  refreshCurrency();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlayBg(e) {
  if (e.target === document.getElementById('overlay')) closeOverlay();
}

function filterCurrencies(query) {
  const q   = query.toLowerCase().trim();
  const list = document.getElementById('currList');
  list.innerHTML = '';

  ALL_CURRENCIES
    .filter(c => !q ||
      c.code.toLowerCase().includes(q) ||
      c.name.toLowerCase().includes(q) ||
      c.country.toLowerCase().includes(q))
    .forEach(c => {
      const isSelected = (overlayTarget === 'from' ? currFrom : currTo) === c.code;
      const item = document.createElement('div');
      item.className = 'curr-item';
      item.innerHTML = `
        <span class="curr-flag">${c.flag}</span>
        <div class="curr-item-info">
          <div class="curr-item-code">${c.code} <span style="font-weight:400;color:#555">${c.name}</span></div>
          <div class="curr-item-country">${c.country}</div>
        </div>
        <span class="curr-item-check">${isSelected ? '✓' : ''}</span>`;
      item.onclick = () => selectFromOverlay(c.code);
      list.appendChild(item);
    });
}

// ── SWIPE BETWEEN TABS ───────────────────────────────────
let swipeStartX = 0;
let swipeStartY = 0;

document.querySelector('.calc').addEventListener('touchstart', e => {
  swipeStartX = e.touches[0].clientX;
  swipeStartY = e.touches[0].clientY;
}, { passive: true });

document.querySelector('.calc').addEventListener('touchend', e => {
  // Don't trigger when currency or history overlay is open
  if (document.getElementById('overlay').classList.contains('open'))    return;
  if (document.getElementById('histOverlay').classList.contains('open')) return;

  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;

  // Horizontal must dominate and exceed threshold
  if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy) * 1.5) return;

  const modes = ['norm', 'sci', 'curr', 'tip'];
  const idx   = modes.indexOf(mode);
  if (dx < 0 && idx < modes.length - 1) setMode(modes[idx + 1]);
  else if (dx > 0 && idx > 0)           setMode(modes[idx - 1]);
}, { passive: true });

// ── TIP CALCULATOR ───────────────────────────────────────
function closeTip() {
  setMode('norm');
}

function calcTip() {
  const bill  = parseFloat(document.getElementById('tipBill').value)  || 0;
  const pct   = parseFloat(document.getElementById('tipPct').value)   || 0;
  const split = Math.max(1, parseInt(document.getElementById('tipSplit').value) || 1);

  if (!bill) {
    ['tipAmt', 'tipTotal', 'tipPer'].forEach(id =>
      document.getElementById(id).textContent = '—');
    return;
  }

  const tip   = bill * pct / 100;
  const total = bill + tip;
  const per   = total / split;
  const fmt   = n => '₪' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

  document.getElementById('tipAmt').textContent   = fmt(tip);
  document.getElementById('tipTotal').textContent  = fmt(total);
  document.getElementById('tipPer').textContent    = fmt(per);
}

// ── HISTORY ──────────────────────────────────────────────
let calcHistory = JSON.parse(localStorage.getItem('calcHistory') || '[]');

function addToHistory(exprStr, resultStr) {
  calcHistory.unshift({ expr: exprStr, result: resultStr });
  if (calcHistory.length > 10) calcHistory.pop();
  localStorage.setItem('calcHistory', JSON.stringify(calcHistory));
}

function openHistory() {
  renderHistory();
  document.getElementById('histOverlay').classList.add('open');
}

function closeHistory() {
  document.getElementById('histOverlay').classList.remove('open');
}

function handleHistOverlayBg(e) {
  if (e.target === document.getElementById('histOverlay')) closeHistory();
}

function renderHistory() {
  const list = document.getElementById('histList');
  list.innerHTML = '';
  if (!calcHistory.length) {
    list.innerHTML = '<p class="hist-empty">No calculations yet</p>';
    return;
  }
  calcHistory.forEach(item => {
    const el = document.createElement('div');
    el.className = 'hist-item';
    el.innerHTML = `
      <div class="hist-item-expr">${item.expr}</div>
      <div class="hist-item-result">${item.result}</div>`;
    el.onclick = () => loadFromHistory(item);
    list.appendChild(el);
  });
}

function loadFromHistory(item) {
  expr    = item.result;
  lastAns = parseFloat(item.result.replace(/,/g, ''));
  afterEq = true;
  refresh();
  closeHistory();
}

function clearHistory() {
  calcHistory = [];
  localStorage.removeItem('calcHistory');
  renderHistory();
}

// ── COPY TO CLIPBOARD ────────────────────────────────────
let toastTimer = null;

function copyResult() {
  const txt = document.getElementById('resultEl').textContent;
  if (!txt || txt === '0' || txt === 'Error') return;
  navigator.clipboard.writeText(txt).then(() => showToast('Copied!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('visible'), 2000);
}

// ── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key;
  if (k >= '0' && k <= '9')        { ins(k); return; }
  if (k === '+')                    { ins('+'); return; }
  if (k === '-')                    { ins('−'); return; }
  if (k === '*')                    { ins('×'); return; }
  if (k === '/')                    { e.preventDefault(); ins('÷'); return; }
  if (k === '.')                    { ins('.'); return; }
  if (k === '(')                    { ins('('); return; }
  if (k === ')')                    { ins(')'); return; }
  if (k === '^')                    { ins('^'); return; }
  if (k === 'Enter' || k === '=')   { doCalc(); return; }
  if (k === 'Backspace')            { doDelete(); return; }
  if (k === 'Escape')               { if (mode === 'tip') closeTip(); else if (document.getElementById('histOverlay').classList.contains('open')) closeHistory(); else if (document.getElementById('overlay').classList.contains('open')) closeOverlay(); else doClear(); return; }
});

// ── INIT ─────────────────────────────────────────────────
setMode('norm');

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js');
}
